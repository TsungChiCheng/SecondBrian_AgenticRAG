<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Second Brain</title>
    <link rel="stylesheet" href="static/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
    <!-- Google Sign-In Library -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--background-light) 0%, #e0e7ff 100%);
        }
        
        .login-card {
            background: var(--card-background);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-lg);
            padding: 3rem;
            max-width: 450px;
            width: 100%;
            text-align: center;
        }
        
        .login-header {
            margin-bottom: 2rem;
        }
        
        .login-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-color), #7c3aed);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        
        .login-header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }
        
        .login-divider {
            margin: 2rem 0;
            text-align: center;
            position: relative;
        }
        
        .login-divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--border-color);
        }
        
        .login-divider span {
            background: var(--card-background);
            padding: 0 1rem;
            position: relative;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .google-signin-wrapper {
            display: flex;
            justify-content: center;
            margin: 2rem 0;
        }
        
        .features-list {
            margin-top: 2rem;
            text-align: left;
            color: var(--text-secondary);
        }
        
        .features-list li {
            padding: 0.5rem 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .features-list li::before {
            content: '✓';
            color: var(--success-color);
            font-weight: bold;
            font-size: 1.2rem;
        }
        
        .status-message {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: var(--border-radius);
            font-size: 0.9rem;
        }
        
        .status-error {
            background: #fee2e2;
            color: var(--error-color);
            border: 1px solid #fca5a5;
        }
        
        .status-success {
            background: #d1fae5;
            color: var(--success-color);
            border: 1px solid #a7f3d0;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>🧠 Second Brain</h1>
                <p>Your AI-powered knowledge assistant</p>
            </div>
            
            <div class="login-divider">
                <span>Sign in to continue</span>
            </div>
            
            <div class="google-signin-wrapper">
                <!-- Google Sign-In Button will be rendered here -->
                <div id="g_id_onload"
                     data-client_id="379223612421-22b3tbhsjricq56nolbujom513q0h7h7.apps.googleusercontent.com"
                     data-callback="handleCredentialResponse"
                     data-auto_prompt="false">
                </div>
                <div class="g_id_signin"
                     data-type="standard"
                     data-size="large"
                     data-theme="outline"
                     data-text="sign_in_with"
                     data-shape="rectangular"
                     data-logo_alignment="left">
                </div>
            </div>
            
            <div id="status"></div>
            
            <div class="features-list">
                <h3 style="margin-bottom: 1rem; color: var(--text-primary);">What you'll get:</h3>
                <ul style="list-style: none; padding: 0;">
                    <li>AI-powered knowledge management</li>
                    <li>Multi-model AI consultation</li>
                    <li>Secure personal knowledge base</li>
                    <li>Intelligent search & discovery</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        // Handle Google Sign-In response
        function handleCredentialResponse(response) {
            console.log("Received credential response");
            
            // Decode JWT token to get user info
            const base64Url = response.credential.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            
            const userInfo = JSON.parse(jsonPayload);
            console.log('User info:', userInfo);
            
            // Store user session
            const session = {
                token: response.credential,
                user: {
                    id: userInfo.sub,
                    email: userInfo.email,
                    name: userInfo.name,
                    picture: userInfo.picture,
                    email_verified: userInfo.email_verified
                },
                loginTime: new Date().toISOString()
            };
            
            // Store in localStorage
            localStorage.setItem('secondBrainSession', JSON.stringify(session));
            
            // Show success message
            showStatus('Successfully signed in! Redirecting...', 'success');
            
            // Redirect to main app after a short delay
            setTimeout(() => {
                window.location.href = '/';
            }, 1500);
        }
        
        function showStatus(message, type) {
            const statusEl = document.getElementById('status');
            statusEl.innerHTML = `<div class="status-message status-${type}">${message}</div>`;
            
            if (type === 'error') {
                setTimeout(() => {
                    statusEl.innerHTML = '';
                }, 5000);
            }
        }
        
        // Check if already logged in
        window.addEventListener('DOMContentLoaded', () => {
            const session = localStorage.getItem('secondBrainSession');
            if (session) {
                try {
                    const sessionData = JSON.parse(session);
                    // Check if session is still valid (less than 24 hours old)
                    const loginTime = new Date(sessionData.loginTime);
                    const now = new Date();
                    const hoursSinceLogin = (now - loginTime) / (1000 * 60 * 60);
                    
                    if (hoursSinceLogin < 24) {
                        showStatus('Already logged in. Redirecting...', 'success');
                        setTimeout(() => {
                            window.location.href = '/';
                        }, 1000);
                    } else {
                        // Session expired
                        localStorage.removeItem('secondBrainSession');
                    }
                } catch (e) {
                    console.error('Error parsing session:', e);
                    localStorage.removeItem('secondBrainSession');
                }
            }
        });
    </script>
</body>
</html>
