<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Test</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .test-section { margin: 20px 0; padding: 20px; border: 1px solid #ccc; border-radius: 5px; }
        h2 { color: #333; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
        table { border-collapse: collapse; width: 100%; margin: 10px 0; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #4CAF50; color: white; }
        tr:nth-child(even) { background: #f2f2f2; }
    </style>
</head>
<body>
    <h1>🧪 Markdown Parsing Test</h1>
    
    <div class="test-section">
        <h2>Library Check</h2>
        <div id="library-check"></div>
    </div>

    <div class="test-section">
        <h2>Input Markdown</h2>
        <pre id="input-markdown"></pre>
    </div>

    <div class="test-section">
        <h2>Parsed HTML</h2>
        <pre id="parsed-html"></pre>
    </div>

    <div class="test-section">
        <h2>Rendered Result</h2>
        <div id="rendered-result"></div>
    </div>

    <script>
        // Test markdown (same as what AI returns)
        const testMarkdown = `| Time | Activity | Location | Notes |
|------|----------|----------|-------|
| 8:00 AM | Breakfast | Yongle Market | Try local breakfast items |
| 9:00 AM | Visit Chihkan Tower | Chihkan Tower | Historical site |
| 10:30 AM | Explore Fort Provintia | Fort Provintia | Learn about Tainan's history |
| 12:00 PM | Lunch | Danzai Noodles | Famous local dish |
| 1:30 PM | Visit Anping Fort | Anping Fort | Scenic views and history |

**Bold text** and *italic text* and \`inline code\`.

## Header 2

- Item 1
- Item 2
- Item 3`;

        // Check libraries
        const libCheck = document.getElementById('library-check');
        libCheck.innerHTML = `
            <p><strong>marked.js:</strong> ${typeof marked !== 'undefined' ? '✅ Loaded' : '❌ Not loaded'}</p>
            <p><strong>marked type:</strong> ${typeof marked}</p>
            <p><strong>marked.parse:</strong> ${typeof marked?.parse}</p>
            <p><strong>DOMPurify:</strong> ${typeof DOMPurify !== 'undefined' ? '✅ Loaded' : '❌ Not loaded'}</p>
        `;

        // Show input
        document.getElementById('input-markdown').textContent = testMarkdown;

        // Parse markdown
        try {
            let html;
            
            if (typeof marked === 'function') {
                marked.setOptions && marked.setOptions({
                    breaks: true,
                    gfm: true,
                    headerIds: false,
                    mangle: false
                });
                html = marked(testMarkdown);
                console.log('Used marked() function');
            } else if (typeof marked === 'object' && typeof marked.parse === 'function') {
                marked.use && marked.use({
                    breaks: true,
                    gfm: true,
                    headerIds: false,
                    mangle: false
                });
                html = marked.parse(testMarkdown);
                console.log('Used marked.parse()');
            }

            // Sanitize
            if (typeof DOMPurify !== 'undefined') {
                html = DOMPurify.sanitize(html, {
                    ALLOWED_TAGS: ['p', 'br', 'strong', 'em', 'u', 'code', 'pre', 'h1', 'h2', 'h3', 'h4', 'h5', 'h6', 'ul', 'ol', 'li', 'blockquote', 'a', 'hr', 'table', 'thead', 'tbody', 'tr', 'th', 'td', 'div', 'span'],
                    ALLOWED_ATTR: ['href', 'target', 'rel', 'class', 'style', 'align']
                });
            }

            // Show parsed HTML
            document.getElementById('parsed-html').textContent = html;

            // Render result
            document.getElementById('rendered-result').innerHTML = html;

            console.log('✅ Markdown parsed successfully');
            console.log('HTML length:', html.length);
        } catch (error) {
            document.getElementById('parsed-html').textContent = 'ERROR: ' + error.message;
            console.error('Error:', error);
        }
    </script>
</body>
</html>
