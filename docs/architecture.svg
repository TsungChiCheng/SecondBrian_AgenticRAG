<svg width="820" height="380" viewBox="0 0 820 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="System architecture">
  <defs>
    <style>
      .bg { fill:#ffffff; }
      .box { fill:#eef2ff; stroke:#4338ca; stroke-width:1.6; rx:10; }
      .db  { fill:#fef9c3; stroke:#d97706; stroke-width:1.2; rx:10; }
      .vec { fill:#ecfeff; stroke:#0284c7; stroke-width:1.2; rx:10; }
      .mem { fill:#f0fdf4; stroke:#059669; stroke-width:1.2; rx:10; }
      .text { font: 13px 'Inter','Helvetica',sans-serif; fill:#0f172a; }
      .title { font: 13px 'Inter','Helvetica',sans-serif; font-weight:700; fill:#0f172a; }
      .sub  { font: 11px 'Inter','Helvetica',sans-serif; fill:#475569; }
      .arrow { stroke:#0f172a; stroke-width:1.4; marker-end:url(#arrowhead); }
      .mem-arrow { stroke:#059669; stroke-width:1.4; stroke-dasharray:4,2; marker-end:url(#memarrow); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0f172a"/>
    </marker>
    <marker id="memarrow" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="820" height="380" rx="16" />

  <!-- Frontend -->
  <rect class="box" x="50" y="40" width="200" height="70"/>
  <text class="title" x="150" y="70" text-anchor="middle">Frontend (8000)</text>
  <text class="text"  x="150" y="90" text-anchor="middle">UI / static app</text>

  <!-- API -->
  <rect class="box" x="300" y="40" width="200" height="70"/>
  <text class="title" x="400" y="70" text-anchor="middle">API Service (8001)</text>
  <text class="text"  x="400" y="90" text-anchor="middle">LangGraph + Agentic RAG</text>

  <!-- Vector service -->
  <rect class="vec" x="300" y="150" width="200" height="60"/>
  <text class="title" x="400" y="175" text-anchor="middle">Vector Service (8002)</text>
  <text class="text"  x="400" y="195" text-anchor="middle">Embeddings + search</text>

  <!-- Qdrant -->
  <rect class="vec" x="550" y="150" width="150" height="60"/>
  <text class="title" x="625" y="175" text-anchor="middle">Qdrant</text>
  <text class="text"  x="625" y="195" text-anchor="middle">Vector DB</text>

  <!-- Postgres -->
  <rect class="db" x="550" y="40" width="150" height="70"/>
  <text class="title" x="625" y="65" text-anchor="middle">PostgreSQL</text>
  <text class="text"  x="625" y="85" text-anchor="middle">Sessions / prompt_logs</text>
  <text class="sub"   x="625" y="100" text-anchor="middle">Cross-session memories</text>

  <!-- Memory Flow Legend -->
  <rect class="mem" x="50" y="250" width="220" height="100"/>
  <text class="title" x="160" y="275" text-anchor="middle" fill="#059669">Memory Sources</text>
  <text class="sub" x="160" y="295" text-anchor="middle">1. Vector Search (Qdrant)</text>
  <text class="sub" x="160" y="312" text-anchor="middle">2. User Memories (PostgreSQL)</text>
  <text class="sub" x="160" y="329" text-anchor="middle">3. Session History (current)</text>

  <!-- LLM Box -->
  <rect class="box" x="550" y="250" width="200" height="100"/>
  <text class="title" x="650" y="275" text-anchor="middle">LLM Providers</text>
  <text class="sub" x="650" y="295" text-anchor="middle">OpenAI / Gemini / Grok</text>
  <text class="sub" x="650" y="312" text-anchor="middle">Called with retrieved</text>
  <text class="sub" x="650" y="329" text-anchor="middle">context from all sources</text>

  <!-- Arrows -->
  <line class="arrow" x1="250" y1="75" x2="300" y2="75"/>
  <line class="arrow" x1="500" y1="75" x2="550" y2="75"/>
  <line class="arrow" x1="400" y1="110" x2="400" y2="150"/>
  <line class="arrow" x1="500" y1="180" x2="550" y2="180"/>

  <!-- Memory flow arrows (green dashed) -->
  <line class="mem-arrow" x1="625" y1="110" x2="625" y2="140"/>
  <line class="mem-arrow" x1="270" y1="300" x2="400" y2="210"/>
  <line class="mem-arrow" x1="500" y1="75" x2="550" y2="250"/>

  <!-- Labels -->
  <text class="text" x="275" y="65" text-anchor="middle">HTTP</text>
  <text class="text" x="525" y="65" text-anchor="middle">SQL</text>
  <text class="text" x="450" y="135" text-anchor="middle">REST</text>
  <text class="text" x="525" y="165" text-anchor="middle">REST</text>
</svg>
